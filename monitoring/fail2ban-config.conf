# =============================================================================
# SecureFast VPN — fail2ban Configuration
# Blocks IPs that fail IKEv2 authentication repeatedly.
#
# Install:
#   apt install fail2ban
#   cp fail2ban-ike.conf /etc/fail2ban/filter.d/ike-auth.conf
#   cp fail2ban-jail.conf /etc/fail2ban/jail.d/securefastvpn.conf
#   systemctl restart fail2ban
#   fail2ban-client status ike-auth
# =============================================================================


# ── Filter: /etc/fail2ban/filter.d/ike-auth.conf ─────────────────────────────
# Paste this section into /etc/fail2ban/filter.d/ike-auth.conf

[INCLUDES]
before = common.conf

[Definition]
# Match failed EAP authentication attempts in charon.log
# StrongSwan logs: "EAP method EAP_MSCHAPV2 failed for peer"
# and:             "IKE_AUTH request failed, no shared key found"
# and:             "received NO_PROPOSAL_CHOSEN notify error"

failregex = ^.*charon.*<\d+>.*EAP method.*failed for peer \[<HOST>\].*$
            ^.*charon.*IKE_AUTH.*failed.*\[<HOST>\].*$
            ^.*charon.*received.*NO_PROPOSAL_CHOSEN.*\[<HOST>\].*$
            ^.*charon.*authentication of '<HOST>' failed.*$

ignoreregex =

datepattern = %%b\s+%%d %%H:%%M:%%S


# =============================================================================
# ── Jail: /etc/fail2ban/jail.d/securefastvpn.conf ────────────────────────────
# Paste this section into /etc/fail2ban/jail.d/securefastvpn.conf

[ike-auth]
enabled   = true
filter    = ike-auth
logpath   = /var/log/charon.log
maxretry  = 5
findtime  = 300
bantime   = 3600
action    = iptables-allports[name=ike-auth, protocol=all]

[sshd]
enabled  = true
maxretry = 4
findtime = 300
bantime  = 7200
