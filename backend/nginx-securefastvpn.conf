# Turnip VPN — Nginx Reverse Proxy Config
# Place at: /etc/nginx/sites-available/turnip
# Enable:   ln -s /etc/nginx/sites-available/turnip /etc/nginx/sites-enabled/
# SSL:      certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Certbot will add SSL block here automatically
    # DO NOT serve webhooks over plain HTTP in production

    # Lemon Squeezy payment webhooks
    location /webhook/lemonsqueezy {
        proxy_pass         http://127.0.0.1:8766;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # NOWPayments crypto webhooks
    location /webhook/nowpayments {
        proxy_pass         http://127.0.0.1:8766;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8766;
    }

    # Admin API — only allow requests from the portal frontend
    location /admin-api/ {
        proxy_pass         http://127.0.0.1:8765/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Block all other paths
    location / {
        return 444;
    }
}
