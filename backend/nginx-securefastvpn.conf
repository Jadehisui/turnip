# SecureFast VPN — Nginx Reverse Proxy Config
# Place at: /etc/nginx/sites-available/securefastvpn
# Enable:   ln -s /etc/nginx/sites-available/securefastvpn /etc/nginx/sites-enabled/
# SSL:      certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Certbot will add SSL block here automatically
    # DO NOT serve the webhook over plain HTTP in production

    location /webhook/paystack {
        proxy_pass         http://127.0.0.1:8766;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Only allow Paystack IP ranges
        # Paystack IP list: https://paystack.com/docs/payments/webhooks/#ip-whitelisting
        # allow 52.31.139.75;
        # allow 52.49.173.169;
        # allow 52.214.14.220;
        # deny all;
    }

    location /health {
        proxy_pass http://127.0.0.1:8766;
    }

    # Block all other paths
    location / {
        return 444;
    }
}
